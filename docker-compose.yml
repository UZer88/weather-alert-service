services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: weather_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6381:6379"

  app:
    build: .
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/weather_db
      REDIS_URL: redis://redis:6379
    ports:
      - "8001:8000"
    volumes:
      - ./app:/app/app

  celery_worker:
    build: .
    command: celery -A celery_app.celery_app worker --loglevel=info
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/weather_db
      REDIS_URL: redis://redis:6379
    volumes:
      - ./app:/app/app
      - ./notifiers:/app/notifiers
      - ./celery_app.py:/app/celery_app.py
      - ./celery_tasks.py:/app/celery_tasks.py

  celery_beat:
    build: .
    command: celery -A celery_app.celery_app beat --loglevel=info
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/weather_db
      REDIS_URL: redis://redis:6379
    volumes:
      - ./app:/app/app
      - ./notifiers:/app/notifiers
      - ./celery_app.py:/app/celery_app.py
      - ./celery_tasks.py:/app/celery_tasks.py

volumes:
  postgres_data: